<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lego Builder</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --text: #e7ecff;
        --muted: rgba(231, 236, 255, 0.7);
        --accent: #ffde59;
        --grid: rgba(255, 255, 255, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(1200px 600px at 15% 15%, rgba(57, 188, 255, 0.35), transparent 60%),
                    radial-gradient(900px 500px at 85% 25%, rgba(255, 87, 213, 0.25), transparent 60%),
                    radial-gradient(900px 500px at 50% 80%, rgba(255, 222, 89, 0.18), transparent 60%),
                    var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      header {
        padding: 20px 18px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      h1 { font-size: 18px; margin: 0; }
      .badge {
        padding: 6px 10px;
        border: 1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.05);
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }
      main {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 14px;
        padding: 10px 14px 18px;
      }
      @media (max-width: 900px) {
        main { grid-template-columns: 1fr; }
      }
      .panel {
        background: var(--panel);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 14px;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }
      .panel h2 {
        margin: 0;
        padding: 14px 14px 0;
        font-size: 14px;
        color: var(--muted);
        font-weight: 600;
      }
      .panel .body { padding: 14px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
      input[type="number"], select {
        width: 100%;
        padding: 10px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(0,0,0,0.25);
        color: var(--text);
        outline: none;
      }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; }
      button {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.07);
        color: var(--text);
        cursor: pointer;
        font-weight: 600;
      }
      button.primary {
        background: linear-gradient(180deg, rgba(255, 222, 89, 0.95), rgba(255, 190, 60, 0.92));
        color: #1b1b1b;
        border-color: rgba(255, 222, 89, 0.7);
      }
      button.danger {
        background: rgba(255, 77, 77, 0.10);
        border-color: rgba(255, 77, 77, 0.35);
      }
      .hint { font-size: 12px; color: var(--muted); line-height: 1.4; }

      .canvas-wrap { padding: 14px; }
      .canvas {
        width: 100%;
        aspect-ratio: 16 / 10;
        min-height: 360px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.12);
        background:
          linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 28px 28px,
          linear-gradient(0deg, var(--grid) 1px, transparent 1px) 0 0 / 28px 28px,
          rgba(0,0,0,0.18);
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
      }

      .brick {
        --c: #e53935;
        --w: 2;
        --h: 1;
        position: absolute;
        width: calc(var(--w) * 28px);
        height: calc(var(--h) * 28px);
        border-radius: 12px;
        background:
          radial-gradient(14px 10px at 20% 20%, rgba(255,255,255,0.35), transparent 60%),
          radial-gradient(20px 14px at 80% 0%, rgba(0,0,0,0.25), transparent 60%),
          linear-gradient(180deg, rgba(255,255,255,0.22), rgba(0,0,0,0.22)),
          var(--c);
        border: 1px solid rgba(0,0,0,0.35);
        box-shadow: 0 18px 40px rgba(0,0,0,0.38);
        transform: translate(-50%, -50%);
        cursor: grab;
        user-select: none;
      }
      .brick:active { cursor: grabbing; }
      .studs {
        position: absolute;
        inset: 8px;
        display: grid;
        grid-template-columns: repeat(var(--w), 1fr);
        grid-template-rows: repeat(var(--h), 1fr);
        gap: 8px;
        opacity: 0.9;
        pointer-events: none;
      }
      .stud {
        border-radius: 999px;
        background:
          radial-gradient(10px 8px at 35% 35%, rgba(255,255,255,0.45), transparent 65%),
          radial-gradient(12px 9px at 65% 65%, rgba(0,0,0,0.25), transparent 70%),
          rgba(255,255,255,0.08);
        border: 1px solid rgba(0,0,0,0.30);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.18);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 999px;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }
      .toast.show { opacity: 1; }

      footer { padding: 0 14px 16px; color: var(--muted); font-size: 12px; }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Lego Builder</h1>
        <div class="hint">Drop bricks onto the grid. Drag to move. Your build saves locally.</div>
      </div>
      <div class="badge">apps/lego • static</div>
    </header>

    <main>
      <section class="panel">
        <h2>Controls</h2>
        <div class="body">
          <div class="row">
            <div>
              <label for="w">Width (studs)</label>
              <input id="w" type="number" min="1" max="8" value="2" />
            </div>
            <div>
              <label for="h">Height</label>
              <input id="h" type="number" min="1" max="4" value="1" />
            </div>
          </div>

          <div style="height: 10px"></div>

          <div class="row">
            <div>
              <label for="color">Color</label>
              <select id="color">
                <option value="#e53935">Red</option>
                <option value="#1e88e5">Blue</option>
                <option value="#43a047">Green</option>
                <option value="#fdd835">Yellow</option>
                <option value="#fb8c00">Orange</option>
                <option value="#8e24aa">Purple</option>
                <option value="#546e7a">Gray</option>
                <option value="#ffffff">White</option>
                <option value="#212121">Black</option>
              </select>
            </div>
            <div>
              <label for="snap">Snap</label>
              <select id="snap">
                <option value="on" selected>On (grid)</option>
                <option value="off">Off</option>
              </select>
            </div>
          </div>

          <div style="height: 12px"></div>

          <div class="actions">
            <button class="primary" id="add">Add brick</button>
            <button id="random">Random brick</button>
            <button class="danger" id="clear">Clear</button>
          </div>

          <div style="height: 12px"></div>
          <div class="hint">
            Tip: use <code>Random brick</code> a few times, then drag them around.
            Builds are stored in your browser via <code>localStorage</code>.
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Build area</h2>
        <div class="canvas-wrap">
          <div class="canvas" id="canvas"></div>
        </div>
      </section>
    </main>

    <footer>
      This app is meant to be deployed to Azure Static Web Apps.
    </footer>

    <div class="toast" id="toast"></div>

    <script>
      const GRID = 28;
      const canvas = document.getElementById('canvas');
      const toastEl = document.getElementById('toast');

      const stateKey = 'lego-builder:v1';
      let bricks = [];

      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastEl._t);
        toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 1400);
      }

      function snap(n) { return Math.round(n / GRID) * GRID; }
      function save() { localStorage.setItem(stateKey, JSON.stringify(bricks)); }
      function load() {
        try { bricks = JSON.parse(localStorage.getItem(stateKey) || '[]'); }
        catch { bricks = []; }
      }

      function setPos(el, x, y) {
        el.style.left = x + 'px';
        el.style.top = y + 'px';
      }

      function makeBrickEl(b) {
        const el = document.createElement('div');
        el.className = 'brick';
        el.style.setProperty('--c', b.color);
        el.style.setProperty('--w', b.w);
        el.style.setProperty('--h', b.h);
        el.dataset.id = b.id;

        const studs = document.createElement('div');
        studs.className = 'studs';
        for (let i = 0; i < b.w * b.h; i++) {
          const s = document.createElement('div');
          s.className = 'stud';
          studs.appendChild(s);
        }
        el.appendChild(studs);

        setPos(el, b.x, b.y);
        attachDrag(el);
        return el;
      }

      function render() {
        canvas.innerHTML = '';
        for (const b of bricks) canvas.appendChild(makeBrickEl(b));
      }

      function addBrick({ w, h, color, x, y }) {
        const id = crypto.randomUUID();
        const rect = canvas.getBoundingClientRect();
        const cx = rect.width / 2;
        const cy = rect.height / 2;
        const b = { id, w, h, color, x: x ?? snap(cx), y: y ?? snap(cy) };
        bricks.push(b);
        save();
        render();
      }

      function clearAll() { bricks = []; save(); render(); }

      function attachDrag(el) {
        let dragging = false;
        let start = null;

        const onDown = (e) => {
          e.preventDefault();
          dragging = true;
          const id = el.dataset.id;
          const b = bricks.find(x => x.id === id);
          if (!b) return;
          const pt = getPoint(e);
          start = { id, ox: pt.x - b.x, oy: pt.y - b.y };
          el.style.zIndex = '999';
        };

        const onMove = (e) => {
          if (!dragging || !start) return;
          const b = bricks.find(x => x.id === start.id);
          if (!b) return;
          const pt = getPoint(e);

          let nx = pt.x - start.ox;
          let ny = pt.y - start.oy;

          if (document.getElementById('snap').value === 'on') {
            nx = snap(nx);
            ny = snap(ny);
          }

          const rect = canvas.getBoundingClientRect();
          nx = Math.max(0, Math.min(rect.width, nx));
          ny = Math.max(0, Math.min(rect.height, ny));

          b.x = nx;
          b.y = ny;
          setPos(el, b.x, b.y);
        };

        const onUp = () => { if (!dragging) return; dragging = false; start = null; save(); };

        el.addEventListener('mousedown', onDown);
        el.addEventListener('touchstart', onDown, { passive: false });
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchend', onUp);
      }

      function getPoint(e) {
        const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches[0]) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }

      document.getElementById('add').addEventListener('click', () => {
        const w = clamp(parseInt(document.getElementById('w').value, 10) || 2, 1, 8);
        const h = clamp(parseInt(document.getElementById('h').value, 10) || 1, 1, 4);
        const color = document.getElementById('color').value;
        addBrick({ w, h, color });
        toast('Brick added');
      });

      document.getElementById('random').addEventListener('click', () => {
        const w = randInt(1, 6);
        const h = randInt(1, 3);
        const colors = ['#e53935','#1e88e5','#43a047','#fdd835','#fb8c00','#8e24aa','#546e7a','#ffffff','#212121'];
        const color = colors[randInt(0, colors.length - 1)];
        addBrick({ w, h, color });
        toast('Random brick');
      });

      document.getElementById('clear').addEventListener('click', () => {
        if (confirm('Clear the whole build?')) { clearAll(); toast('Cleared'); }
      });

      function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
      function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

      load();
      render();
    </script>
  </body>
</html>
