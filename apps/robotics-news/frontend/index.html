<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Robotics News</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>Robotics News</h1>
      <p class="sub">Fresh robotics headlines (mocked JSON via .NET API)</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <label>
        API Base URL
        <input id="apiBaseUrl" placeholder="https://<your-api>.azurewebsites.net" />
      </label>
      <button id="loadBtn">Load news</button>
      <span id="status" class="status"></span>
    </section>

    <section>
      <ul id="list" class="list"></ul>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
