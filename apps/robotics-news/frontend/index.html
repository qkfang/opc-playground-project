<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Robotics News</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>Robotics News</h1>
      <p class="sub">Latest robotics headlines powered by an RSS-backed .NET API.</p>
    </div>
  </header>

  <main class="container">
    <section class="controls" aria-live="polite">
      <div>
        <h2>Latest robotics news</h2>
        <p class="sub">Refresh to load the newest stories from the configured RSS feeds.</p>
      </div>
      <button id="refreshBtn" type="button">Refresh</button>
    </section>
    <p id="status" class="status" role="status"></p>

    <section>
      <ul id="list" class="list"></ul>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
