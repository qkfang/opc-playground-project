<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fruit & Robotics News</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b1220; color: #e8eefc; }
    header { padding: 32px 20px; background: linear-gradient(90deg, #1a2a6c, #b21f1f, #fdbb2d); }
    h1 { margin: 0 0 8px; }
    .wrap { max-width: 980px; margin: 0 auto; }
    main { padding: 24px 20px 64px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin: 16px 0 28px; }
    .card { background: #111a2d; border: 1px solid #233155; border-radius: 14px; padding: 14px; }
    .pill { display: inline-block; font-size: 12px; padding: 4px 10px; border-radius: 999px; background: #243b77; }
    a { color: #a7c5ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #b9c5e3; font-size: 14px; }
    button { background: #2a5bd7; color: #fff; border: 0; padding: 10px 12px; border-radius: 10px; cursor: pointer; }
    button:hover { filter: brightness(1.05); }
    ul { padding-left: 18px; }
    li { margin: 10px 0; }
    .err { color: #ffb4b4; }
    footer { border-top: 1px solid #233155; padding: 18px 20px; color: #b9c5e3; }
    code { background: #0f1830; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="pill">Azure Static Web Apps + .NET API</div>
      <h1>Fruit & Robotics News</h1>
      <div class="muted">A tiny fruit site that pulls a fresh robotics news list from our API.</div>
    </div>
  </header>

  <main class="wrap">
    <h2>Fruits</h2>
    <div class="cards" id="fruits"></div>

    <h2>Robotics News</h2>
    <div class="muted">API: <code id="apiBase"></code></div>
    <div style="margin: 12px 0 14px; display:flex; gap:10px; align-items:center;">
      <button id="refresh">Refresh</button>
      <span class="muted" id="status"></span>
    </div>

    <div id="news"></div>
  </main>

  <footer>
    <div class="wrap">Built for Dan — mock news for now (no external feed dependency).</div>
  </footer>

  <script>
    const fruits = [
      { name: 'Apple', desc: 'Crunchy, classic, unstoppable.' },
      { name: 'Banana', desc: 'Fast energy. Great for debugging sessions.' },
      { name: 'Orange', desc: 'Citrus refresh. Like a clean deploy.' },
      { name: 'Strawberry', desc: 'Sweet and slightly dramatic.' },
      { name: 'Mango', desc: 'Tropical confidence.' },
      { name: 'Pineapple', desc: 'Spiky outside, delightful inside.' },
    ];

    function renderFruits() {
      const el = document.getElementById('fruits');
      el.innerHTML = fruits.map(f => `
        <div class="card">
          <div class="pill">${f.name}</div>
          <div style="margin-top:10px" class="muted">${f.desc}</div>
        </div>
      `).join('');
    }

    const API_BASE_URL = (window.API_BASE_URL || window.__env?.API_BASE_URL || '').trim();
    const apiBase = API_BASE_URL || 'http://localhost:5080';
    document.getElementById('apiBase').textContent = apiBase;

    async function refreshNews() {
      const status = document.getElementById('status');
      const newsEl = document.getElementById('news');
      status.textContent = 'Loading…';
      newsEl.innerHTML = '';
      try {
        const res = await fetch(`${apiBase}/api/news/robotics?count=10`, { headers: { 'accept': 'application/json' }});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const items = await res.json();
        if (!Array.isArray(items) || items.length === 0) {
          newsEl.innerHTML = '<div class="muted">No news items.</div>';
        } else {
          newsEl.innerHTML = `<ul>${items.map(i => `
            <li>
              <div><a href="${i.url}" target="_blank" rel="noreferrer">${i.title}</a></div>
              <div class="muted">${i.source} • ${new Date(i.publishedAt).toLocaleString()}</div>
            </li>
          `).join('')}</ul>`;
        }
        status.textContent = `Loaded ${items.length} items`;
      } catch (e) {
        status.textContent = 'Failed';
        newsEl.innerHTML = `<div class="err">Error loading news: ${String(e.message || e)}</div>`;
      }
    }

    document.getElementById('refresh').addEventListener('click', refreshNews);
    renderFruits();
    refreshNews();
  </script>
</body>
</html>
