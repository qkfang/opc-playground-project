name: 20260606_fruit_robotics_news_deploy_backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '20260606_fruit_robotics_news/apps/backend/**'
      - '.github/workflows/20260606_fruit_robotics_news_deploy_backend.yml'

permissions:
  contents: read

env:
  BACKEND_PROJECT_PATH: 20260606_fruit_robotics_news/apps/backend
  DOTNET_VERSION: '8.0.x'
  PUBLISH_OUTPUT_PATH: /tmp/publish-backend
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME_20260606_FRUIT_ROBOTICS_NEWS }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.BACKEND_PROJECT_PATH }}"

      - name: Publish
        run: dotnet publish "${{ env.BACKEND_PROJECT_PATH }}" --configuration Release --output "${{ env.PUBLISH_OUTPUT_PATH }}"

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_OUTPUT_PATH }}
