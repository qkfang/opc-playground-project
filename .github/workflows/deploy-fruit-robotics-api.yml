name: Deploy Fruit Robotics API

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/fruit-robotics-api/**'
      - '.github/workflows/deploy-fruit-robotics-api.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/fruit-robotics-api/FruitRoboticsApi/FruitRoboticsApi.csproj

      - name: Build
        run: dotnet build src/fruit-robotics-api/FruitRoboticsApi/FruitRoboticsApi.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish src/fruit-robotics-api/FruitRoboticsApi/FruitRoboticsApi.csproj -c Release -o publish

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fruit-robotics-api-idb34vhhmgayi
          package: publish
