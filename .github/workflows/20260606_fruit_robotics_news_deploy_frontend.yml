name: 20260606_fruit_robotics_news_deploy_frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '20260606_fruit_robotics_news/apps/frontend/**'
      - '.github/workflows/20260606_fruit_robotics_news_deploy_frontend.yml'

permissions:
  contents: read

env:
  FRONTEND_APP_LOCATION: 20260606_fruit_robotics_news/apps/frontend

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_20260606_FRUIT_ROBOTICS_NEWS }}
          repo_token: ''
          action: upload
          skip_app_build: true
          app_location: ${{ env.FRONTEND_APP_LOCATION }}
          output_location: ''
