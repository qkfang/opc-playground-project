name: 20260606_fruit_robotics_news_deploy_frontend

on:
  workflow_dispatch:
  push:
    paths:
      - '20260606_fruit_robotics_news/apps/frontend/**'
      - '.github/workflows/20260606_fruit_robotics_news_deploy_frontend.yml'

permissions:
  contents: read

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    env:
      FRONTEND_DIR: 20260606_fruit_robotics_news/apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install
        run: npm ci
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_BASE_URL: ${{ secrets.FRUIT_ROBOTICS_BACKEND_API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.FRONTEND_DIR }}/dist
          output_location: ""
          skip_app_build: true
