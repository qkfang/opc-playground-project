name: proj36_robot_website_v2_deploy

on:
  workflow_dispatch:
    inputs:
      baseName:
        description: "Base name used in resource naming (matches infra)"
        required: true
        default: "proj36"
      appPath:
        description: "Static app source directory (no build step)"
        required: true
        default: "proj36_robot_website_v2/apps/web"
      apiPath:
        description: "Azure Functions API source directory (managed functions)"
        required: true
        default: "proj36_robot_website_v2/apps/api"

permissions:
  contents: read

env:
  RESOURCE_GROUP: rg-playground-01

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve SWA token + host
        id: swa
        uses: azure/cli@v3
        with:
          inlineScript: |
            set -euo pipefail
            SWA=$(az staticwebapp list -g "$RESOURCE_GROUP" \
              --query "[?starts_with(name,'${{ inputs.baseName }}-swa-')].name | [0]" -o tsv)
            if [ -z "$SWA" ]; then
              echo "No Static Web App found for baseName=${{ inputs.baseName }} in $RESOURCE_GROUP"
              echo "Run proj36_robot_website_v2_infra first."; exit 1
            fi
            TOKEN=$(az staticwebapp secrets list --name "$SWA" \
              --resource-group "$RESOURCE_GROUP" --query properties.apiKey -o tsv)
            echo "::add-mask::$TOKEN"
            HOST=$(az staticwebapp show --name "$SWA" \
              --resource-group "$RESOURCE_GROUP" --query defaultHostname -o tsv)
            echo "swaName=$SWA" >> "$GITHUB_OUTPUT"
            echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
            echo "appUrl=https://$HOST" >> "$GITHUB_OUTPUT"
            echo "Static Web App: $SWA ; URL: https://$HOST"

      - name: Deploy to Azure Static Web Apps (static front-end + managed Functions API)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          action: upload
          app_location: ${{ inputs.appPath }}
          api_location: ${{ inputs.apiPath }}
          output_location: ""
          skip_app_build: true

      - name: Smoke check live site
        run: |
          set -euo pipefail
          URL="${{ steps.swa.outputs.appUrl }}"
          echo "Waiting for app to go live at $URL ..."
          ok=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/" || echo "000")
            echo "attempt $i: / -> $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "Home did not return 200 in time"
            curl -s -i "$URL/" | head -n 20 || true
            exit 1
          fi
          echo "Live OK. Sampling:"
          echo "--- / ---"; curl -s -o /dev/null -w "home %{http_code}\n" "$URL/"
          echo "--- title check ---"; curl -s "$URL/" | grep -io "<title>[^<]*</title>" | head -n 1 || true
          echo "--- styles.css ---"; curl -s -o /dev/null -w "styles.css %{http_code}\n" "$URL/styles.css"
          echo "--- js/main.js ---"; curl -s -o /dev/null -w "main.js %{http_code}\n" "$URL/js/main.js"

      - name: Smoke check feedback API (POST + GET /api/feedback)
        run: |
          set -euo pipefail
          URL="${{ steps.swa.outputs.appUrl }}"
          echo "Waiting for /api/health ..."
          ok=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            echo "attempt $i: /api/health -> $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "Managed Functions API did not become healthy in time"
            curl -s -i "$URL/api/health" | head -n 20 || true
            exit 1
          fi
          echo "--- POST /api/feedback ---"
          post=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$URL/api/feedback" \
            -H "Content-Type: application/json" \
            -d '{"name":"Deploy Smoke","email":"smoke@example.com","rating":5,"message":"automated deploy smoke"}')
          echo "POST -> $post"
          [ "$post" = "201" ] || { echo "Expected 201 from POST"; exit 1; }
          echo "--- GET /api/feedback ---"
          body=$(curl -s "$URL/api/feedback")
          echo "$body" | head -c 400; echo
          echo "$body" | grep -q '"ok":true' || { echo "GET did not return ok:true"; exit 1; }
          echo "$body" | grep -q 'automated deploy smoke' || { echo "Saved entry not found in GET"; exit 1; }
          echo "Feedback API live OK (POST 201 + GET reflects saved entry)."

      - name: Summary
        run: |
          echo "### Cogsworth Robotics 2.0 website deployed :robot:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Static Web App: ${{ steps.swa.outputs.swaName }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.swa.outputs.appUrl }}" >> "$GITHUB_STEP_SUMMARY"
