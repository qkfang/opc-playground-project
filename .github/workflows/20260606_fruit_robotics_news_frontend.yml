name: 20260606_fruit_robotics_news_frontend

on:
  push:
    branches:
      - main
    paths:
      - '20260606_fruit_robotics_news/apps/frontend/**'
      - '.github/workflows/20260606_fruit_robotics_news_frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to SWA
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 20260606_fruit_robotics_news/apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: 20260606_fruit_robotics_news/apps/frontend
        run: npm ci

      - name: Build
        working-directory: 20260606_fruit_robotics_news/apps/frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN_20260606_FRUIT_ROBOTICS_NEWS }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 20260606_fruit_robotics_news/apps/frontend
          output_location: dist
          skip_app_build: true
