name: 20260613_lego_shop_deploy

on:
  workflow_dispatch:
    inputs:
      baseName:
        description: "Base name used in resource naming (matches infra)"
        required: true
        default: "legoshop20260613"
      appPath:
        description: "App source directory to build and deploy"
        required: true
        default: "20260613_lego_shop/apps/web"

permissions:
  contents: read

env:
  RESOURCE_GROUP: rg-playground-01

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      webAppName: ${{ steps.discover.outputs.webAppName }}
      appUrl: ${{ steps.discover.outputs.appUrl }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ inputs.appPath }}/package-lock.json

      - name: Build (Next.js standalone) in CI
        run: |
          set -euo pipefail
          cd "${{ inputs.appPath }}"
          npm ci
          npm run build
          # Assemble a self-contained deploy folder from the standalone output.
          # standalone/ already contains server.js + minimal node_modules + .next/server.
          # Static assets and public/ must be copied alongside.
          cp -R .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -R public .next/standalone/public; fi
          echo "Standalone package contents:"
          ls -la .next/standalone

      - name: Create deployment package
        run: |
          set -euo pipefail
          cd "${{ inputs.appPath }}/.next/standalone"
          zip -r "$GITHUB_WORKSPACE/app-package.zip" . -x '.git/*'
          echo "Package listing (top level):"
          unzip -l "$GITHUB_WORKSPACE/app-package.zip" | head -n 30

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Discover App Service
        id: discover
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            WEB_APP=$(az webapp list -g "$RESOURCE_GROUP" --query "[?starts_with(name,'${{ inputs.baseName }}-web-')].name | [0]" -o tsv)
            if [ -z "$WEB_APP" ]; then
              echo "No App Service found for baseName=${{ inputs.baseName }} in $RESOURCE_GROUP"
              exit 1
            fi
            HOST=$(az webapp show -g "$RESOURCE_GROUP" -n "$WEB_APP" --query defaultHostName -o tsv)
            echo "webAppName=$WEB_APP" >> "$GITHUB_OUTPUT"
            echo "appUrl=https://$HOST" >> "$GITHUB_OUTPUT"
            echo "App Service: $WEB_APP ; URL: https://$HOST"

      - name: Deploy via Run-From-Package (storage blob)
        id: rfp
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            WEB_APP="${{ steps.discover.outputs.webAppName }}"

            # Dedicated package storage account provisioned by infra.
            # NOTE: this subscription enforces an Azure Policy that disables
            # storage shared-key access, so we authenticate to blob via Entra
            # (AAD) and mint a USER-DELEGATION SAS. The SP running this workflow
            # has "Storage Blob Data Contributor" on the account (granted by infra).
            PREFIX=$(echo "st${{ inputs.baseName }}" | tr -d '-' | cut -c1-13 | tr '[:upper:]' '[:lower:]')
            STORAGE=$(az storage account list -g "$RESOURCE_GROUP" \
              --query "[?starts_with(name,'${PREFIX}')].name | [0]" -o tsv)
            if [ -z "$STORAGE" ]; then
              echo "No package storage account (prefix ${PREFIX}) found in $RESOURCE_GROUP"
              echo "Run the infra workflow first to provision it."; exit 1
            fi
            echo "Using storage account: $STORAGE"

            CONTAINER="app-packages"
            BLOB="${WEB_APP}-$(date +%Y%m%d%H%M%S).zip"

            az storage container create --name "$CONTAINER" \
              --account-name "$STORAGE" --auth-mode login --only-show-errors >/dev/null

            az storage blob upload --account-name "$STORAGE" --auth-mode login \
              --container-name "$CONTAINER" --name "$BLOB" \
              --file "$GITHUB_WORKSPACE/app-package.zip" --overwrite --only-show-errors >/dev/null
            echo "Uploaded package as $CONTAINER/$BLOB"

            # User-delegation (AAD) SAS. Max lifetime is 7 days; this workflow
            # re-mints + re-points the app on every deploy, so re-run within 7
            # days (or on any new build) to refresh access to the package.
            EXPIRY=$(date -u -d "+7 days" '+%Y-%m-%dT%H:%MZ')
            SAS=$(az storage blob generate-sas --account-name "$STORAGE" \
              --auth-mode login --as-user \
              --container-name "$CONTAINER" --name "$BLOB" \
              --permissions r --expiry "$EXPIRY" --https-only -o tsv)
            PKG_URL="https://${STORAGE}.blob.core.windows.net/${CONTAINER}/${BLOB}?${SAS}"

            az webapp config set \
              --resource-group "$RESOURCE_GROUP" --name "$WEB_APP" \
              --linux-fx-version "NODE|22-lts" --startup-file "node server.js"

            # Point the app at the package URL. App Service mounts the zip
            # read-only at /home/site/wwwroot — no Kudu extract / node_modules
            # optimize / rsync, which is what 502s on B1.
            az webapp config appsettings set \
              --resource-group "$RESOURCE_GROUP" --name "$WEB_APP" \
              --settings \
                WEBSITE_RUN_FROM_PACKAGE="$PKG_URL" \
                SCM_DO_BUILD_DURING_DEPLOYMENT=false \
                NODE_ENV=production \
                PORT=8080 \
              --only-show-errors >/dev/null

            echo "Restarting app to mount the new package..."
            az webapp restart --resource-group "$RESOURCE_GROUP" --name "$WEB_APP"
            echo "Configured run-from-package for $WEB_APP"

      - name: Smoke check live site
        run: |
          set -euo pipefail
          URL="${{ steps.discover.outputs.appUrl }}"
          echo "Waiting for app to warm up at $URL ..."
          ok=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            echo "attempt $i: /api/health -> $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "Health endpoint did not return 200 in time"
            curl -s -i "$URL" | head -n 20 || true
            exit 1
          fi
          echo "Health OK. Sampling endpoints:"
          echo "--- /api/health ---"; curl -s "$URL/api/health"; echo
          echo "--- /api/products (head) ---"; curl -s "$URL/api/products" | head -c 300; echo
          echo "--- / ---"; curl -s -o /dev/null -w "home %{http_code}\n" "$URL"
          echo "--- /shop ---"; curl -s -o /dev/null -w "shop %{http_code}\n" "$URL/shop"
          echo "--- /cart ---"; curl -s -o /dev/null -w "cart %{http_code}\n" "$URL/cart"

      - name: Summary
        run: |
          echo "### Lego Shop app deployed :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "- App Service: ${{ steps.discover.outputs.webAppName }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.discover.outputs.appUrl }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health: ${{ steps.discover.outputs.appUrl }}/api/health" >> "$GITHUB_STEP_SUMMARY"
