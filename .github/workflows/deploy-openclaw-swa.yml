name: Deploy Lego app to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "apps/lego/**"
      - ".github/workflows/deploy-openclaw-swa.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Static content only; no build step.
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/lego"
          api_location: ""
          output_location: ""
