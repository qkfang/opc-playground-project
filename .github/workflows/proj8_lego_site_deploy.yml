name: proj8_lego_site_deploy

on:
  workflow_dispatch:
    inputs:
      deployBackend:
        description: "Also build+deploy the backend Function App"
        type: boolean
        default: true

permissions:
  contents: read

env:
  RESOURCE_GROUP: rg-playground-01
  FUNC_DIR: proj8_lego_site/apps/backend
  FRONTEND_DIR: proj8_lego_site/apps/frontend
  FUNC_PREFIX: proj8-func
  SWA_PREFIX: proj8-swa

jobs:
  deploy-backend:
    if: ${{ inputs.deployBackend }}
    runs-on: ubuntu-latest
    outputs:
      funcHost: ${{ steps.discover.outputs.funcHost }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build backend
        run: |
          set -euo pipefail
          cd "$FUNC_DIR"
          npm ci
          npm run build
          npm prune --omit=dev
      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Discover Function App
        id: discover
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            FN=$(az functionapp list -g "$RESOURCE_GROUP" --query "[?starts_with(name,'$FUNC_PREFIX')].name | [0]" -o tsv)
            HOST=$(az functionapp show -g "$RESOURCE_GROUP" -n "$FN" --query defaultHostName -o tsv)
            echo "funcName=$FN" >> "$GITHUB_OUTPUT"
            echo "funcHost=$HOST" >> "$GITHUB_OUTPUT"
      - name: Create backend deployment package
        run: |
          set -euo pipefail
          cd "$FUNC_DIR"
          rm -f ../backend-package.zip
          python - <<'PY'
          import os
          import zipfile

          root = '.'
          out = os.path.normpath('../backend-package.zip')
          excludes = {'.git', '.github'}

          with zipfile.ZipFile(out, 'w', compression=zipfile.ZIP_DEFLATED) as zf:
              for current_root, dirs, files in os.walk(root):
                  dirs[:] = [d for d in dirs if d not in excludes and not d.startswith('.git')]
                  rel_root = os.path.relpath(current_root, root)
                  if rel_root.startswith(os.path.join('dist', 'src', 'test')):
                      continue
                  for file_name in files:
                      if file_name.endswith('.zip'):
                          continue
                      full_path = os.path.join(current_root, file_name)
                      rel_path = os.path.relpath(full_path, root)
                      if rel_path.startswith(os.path.join('dist', 'src', 'test')):
                          continue
                      zf.write(full_path, rel_path)
          PY
      - name: Zip deploy backend
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            az functionapp deployment source config-zip \
              -g "$RESOURCE_GROUP" -n "${{ steps.discover.outputs.funcName }}" \
              --src proj8_lego_site/apps/backend-package.zip --only-show-errors

  deploy-frontend:
    needs: [deploy-backend]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Resolve SWA + backend URL
        id: cfg
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            SWA=$(az staticwebapp list -g "$RESOURCE_GROUP" --query "[?starts_with(name,'$SWA_PREFIX')].name | [0]" -o tsv)
            TOKEN=$(az staticwebapp secrets list -g "$RESOURCE_GROUP" -n "$SWA" --query "properties.apiKey" -o tsv)
            FN=$(az functionapp list -g "$RESOURCE_GROUP" --query "[?starts_with(name,'$FUNC_PREFIX')].name | [0]" -o tsv)
            FN_HOST=$(az functionapp show -g "$RESOURCE_GROUP" -n "$FN" --query defaultHostName -o tsv)
            echo "swaName=$SWA" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
            echo "apiBase=https://$FN_HOST" >> "$GITHUB_OUTPUT"
      - name: Build frontend (static export)
        run: |
          set -euo pipefail
          cd "$FRONTEND_DIR"
          npm ci
          NEXT_PUBLIC_API_BASE_URL="${{ steps.cfg.outputs.apiBase }}" npm run build
          cp staticwebapp.config.json out/staticwebapp.config.json
      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.cfg.outputs.token }}
          action: upload
          app_location: "proj8_lego_site/apps/frontend/out"
          skip_app_build: true
          skip_api_build: true
          output_location: ""
      - name: Summary
        run: |
          echo "### LEGO marketplace deployed :bricks:" >> "$GITHUB_STEP_SUMMARY"
          echo "- SWA: ${{ steps.cfg.outputs.swaName }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- API base (baked): ${{ steps.cfg.outputs.apiBase }}" >> "$GITHUB_STEP_SUMMARY"
