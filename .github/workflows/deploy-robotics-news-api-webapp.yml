name: Deploy Robotics News API (Azure Web App)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/robotics-news/RoboticsNews.Api/**"
      - ".github/workflows/deploy-robotics-news-api-webapp.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: app-robotics-news-api-01
  DOTNET_VERSION: "10.0.x"
  WORKING_DIRECTORY: "apps/robotics-news/RoboticsNews.Api"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Build
        run: dotnet build --configuration Release --no-restore
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Publish
        run: dotnet publish --configuration Release --no-build -o ${{ runner.temp }}/publish
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ROBOTICS_NEWS_API }}
          package: ${{ runner.temp }}/publish
