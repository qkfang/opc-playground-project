name: 20260606_fruit_robotics_news_api

on:
  push:
    branches:
      - main
    paths:
      - '20260606_fruit_robotics_news/apps/backend/**'
      - '.github/workflows/20260606_fruit_robotics_news_api.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: '20260606_fruit_robotics_news/apps/backend/FruitRoboticsNews.Api'
  PUBLISH_PATH: '20260606_fruit_robotics_news/apps/backend/publish'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --no-build --configuration Release --output ${{ env.PUBLISH_PATH }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_20260606_FRUIT_ROBOTICS_NEWS }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_20260606_FRUIT_ROBOTICS_NEWS }}
          package: ${{ env.PUBLISH_PATH }}
