name: deploy-api-webapp

on:
  push:
    branches: [ main ]
    paths:
      - 'repo/2026-06-06-lego-robotics-news/apps/api/**'
      - '.github/workflows/deploy-api-webapp.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: lego-robotics-4071-api
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: apps/api/LegoRoboticsNews.Api/LegoRoboticsNews.Api.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output publish

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: publish
