name: 20260608_difficulty_webapp_deploy

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  RESOURCE_GROUP: rg-playground-01
  SWA_NAME: difficulty20260608-swa
  APP_DIR: 20260608_difficulty_webapp/apps/frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve SWA deployment token
        id: swa
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            TOKEN=$(az staticwebapp secrets list \
              --name "$SWA_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query properties.apiKey -o tsv)
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
            DEFAULT_HOST=$(az staticwebapp show \
              --name "$SWA_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query defaultHostname -o tsv)
            echo "defaultHost=https://$DEFAULT_HOST" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          action: upload
          app_location: ${{ env.APP_DIR }}/dist
          output_location: ""
          skip_app_build: true
          skip_api_build: true

      - name: Summary
        run: |
          echo "### Difficulty web app deployed 🎮" >> "$GITHUB_STEP_SUMMARY"
          echo "- Static Web App: $SWA_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.swa.outputs.defaultHost }}" >> "$GITHUB_STEP_SUMMARY"
