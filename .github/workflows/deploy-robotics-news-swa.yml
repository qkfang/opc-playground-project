name: Deploy Robotics News Frontend (Azure Static Web Apps)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/robotics-news/frontend/**"
      - "apps/robotics-news/infra/**"
      - ".github/workflows/deploy-robotics-news-swa.yml"
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-playgound-01
  AZURE_STATIC_WEB_APP_NAME: swa-robotics-news-01
  APP_LOCATION: "apps/robotics-news/frontend"
  API_BASE_URL: ${{ vars.ROBOTICS_NEWS_API_BASE_URL }}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Write frontend config
        run: |
          if [ -z "${API_BASE_URL}" ]; then
            echo "ROBOTICS_NEWS_API_BASE_URL is not configured."
            exit 1
          fi

          cat <<EOF > "${APP_LOCATION}/config.js"
          window.ROBOTICS_NEWS_CONFIG = {
            apiBaseUrl: "${API_BASE_URL}"
          };
          EOF

      - name: Get Static Web App deployment token
        id: deployment-token
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          token=$(az staticwebapp secrets list \
            --name "${AZURE_STATIC_WEB_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.apiKey \
            -o tsv)
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.deployment-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: ${{ env.APP_LOCATION }}
          output_location: ""
          skip_app_build: true
          api_location: ""
