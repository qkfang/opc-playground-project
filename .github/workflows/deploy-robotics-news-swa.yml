name: Deploy Robotics News Frontend (Azure Static Web Apps)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/robotics-news/frontend/**"
      - ".github/workflows/deploy-robotics-news-swa.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ROBOTICS_NEWS }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/robotics-news/frontend"
          output_location: ""
