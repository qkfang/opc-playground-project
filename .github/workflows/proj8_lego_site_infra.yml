name: proj8_lego_site_infra

on:
  workflow_dispatch:
    inputs:
      deployCosmos:
        description: "Provision Cosmos DB (false = mock/in-memory store)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  RESOURCE_GROUP: rg-playground-01
  PROJECT_DIR: proj8_lego_site

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: bicep
        uses: azure/cli@v3
        with:
          inlineScript: |
            set -euo pipefail
            cd "$PROJECT_DIR/bicep"
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --name "lego-infra-${GITHUB_RUN_NUMBER}" \
              --template-file main.bicep \
              --parameters deployCosmos=${{ inputs.deployCosmos }} \
              --only-show-errors \
              --output json > deploy.json || {
                echo "Bicep deployment failed; checking for already-provisioned LEGO resources in rg-playground-01"
                SWA=$(az staticwebapp list -g "$RESOURCE_GROUP" --query "[?starts_with(name,'proj8-swa')].name | [0]" -o tsv)
                FN=$(az functionapp list -g "$RESOURCE_GROUP" --query "[?starts_with(name,'proj8-func')].name | [0]" -o tsv)
                if [ -n "$SWA" ] && [ -n "$FN" ]; then
                  SWA_HOST=$(az staticwebapp show -g "$RESOURCE_GROUP" -n "$SWA" --query defaultHostname -o tsv)
                  FN_HOST=$(az functionapp show -g "$RESOURCE_GROUP" -n "$FN" --query defaultHostName -o tsv)
                  jq -n \
                    --arg swa "$SWA" --arg swaHost "$SWA_HOST" \
                    --arg fn "$FN" --arg fnHost "$FN_HOST" \
                    '{properties:{outputs:{staticWebAppName:{value:$swa},staticWebAppHostname:{value:$swaHost},functionAppName:{value:$fn},functionAppHostname:{value:$fnHost}}}}' \
                    > deploy.json
                else
                  exit 1
                fi
              }
            echo "swaName=$(jq -r '.properties.outputs.staticWebAppName.value' deploy.json)" >> "$GITHUB_OUTPUT"
            echo "swaHost=$(jq -r '.properties.outputs.staticWebAppHostname.value' deploy.json)" >> "$GITHUB_OUTPUT"
            echo "funcName=$(jq -r '.properties.outputs.functionAppName.value' deploy.json)" >> "$GITHUB_OUTPUT"
            echo "funcHost=$(jq -r '.properties.outputs.functionAppHostname.value' deploy.json)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "### LEGO infra deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- SWA: ${{ steps.bicep.outputs.swaName }} (https://${{ steps.bicep.outputs.swaHost }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Function App: ${{ steps.bicep.outputs.funcName }} (https://${{ steps.bicep.outputs.funcHost }})" >> "$GITHUB_STEP_SUMMARY"
