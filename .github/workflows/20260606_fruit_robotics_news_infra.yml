name: 20260606_fruit_robotics_news_infra

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '20260606_fruit_robotics_news/bicep/**'
      - '.github/workflows/20260606_fruit_robotics_news_infra.yml'

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
  BICEP_FILE: 20260606_fruit_robotics_news/bicep/main.bicep

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            result=$(az deployment group create \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --template-file "$BICEP_FILE" \
              --parameters location="$AZURE_LOCATION" \
              --query properties.outputs \
              --output json)

            web_app_name=$(echo "$result" | jq -r '.webAppName.value')
            static_web_app_name=$(echo "$result" | jq -r '.staticWebAppName.value')

            echo "web_app_name=$web_app_name" >> "$GITHUB_OUTPUT"
            echo "static_web_app_name=$static_web_app_name" >> "$GITHUB_OUTPUT"
            echo "web_app_name=$web_app_name"
            echo "static_web_app_name=$static_web_app_name"

      - name: Get Static Web App deployment token hint
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            token=$(az staticwebapp secrets list \
              --name "${{ steps.deploy.outputs.static_web_app_name }}" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "properties.apiKey" \
              --output tsv)

            echo "::add-mask::$token"
            echo "Retrieved Static Web App deployment token."
            echo "Store this token as repository secret AZURE_STATIC_WEB_APPS_API_TOKEN_20260606_FRUIT_ROBOTICS_NEWS."
